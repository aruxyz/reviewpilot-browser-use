app:
  name: "ReviewPilot Demo"
  url: "https://review-pilot-demo.vercel.app"

review:
  mode: "local"
  max_steps: 10
  timeout_seconds: 120

browser_use:
  enabled: true
  task_model: "bu-latest"
  planner_model: "bu-latest"
  headless: true

viewports:
  - name: "desktop"
    width: 1440
    height: 900

journeys:
  - name: "Login flow"
    goal: "Open the login page at /login. Inspect the form. Try entering a valid email (test@example.com) and a password. Check whether the Sign In button becomes enabled and whether any error message clears. Report what you find."

checks:
  ux: true
  broken_links: true
  forms: true
  mobile_layout: false
  accessibility_basic: true
  console_errors: true

output:
  markdown: true
  html: true
  screenshots: true
  github_comment: false
  output_dir: ".reviewpilot-output-smoke"

safety:
  safe_mode: true
  allow_form_submit: false
  allow_destructive_actions: false
  redact_secrets: true
